name: Build and Push Docker Image

on:
  push:
    branches:
      - main            # triggers on push to main branch
  workflow_dispatch:   # enables manual trigger from Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx (required for advanced builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build Docker image with tags
      - name: Build Docker image
        run: |
          docker build \
            -t madhan29/moviebooking-api:latest \
            -t madhan29/moviebooking-api:${{ github.run_number }} .

      # Step 5: Push both tags to Docker Hub
      - name: Push Docker image
        run: |
          docker push madhan29/moviebooking-api:latest
          docker push madhan29/moviebooking-api:${{ github.run_number }}
